name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Đảm bảo tên nhánh trùng với nhánh chính của bạn (main hoặc master)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Đã sửa lỗi typo node-node-version
          cache: 'npm'

      - name: Install dependencies
        run: npm install # Đổi từ npm ci sang npm install để linh hoạt hơn nếu thiếu file lock

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
